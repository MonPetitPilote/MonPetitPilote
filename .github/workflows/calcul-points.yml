name: Calcul Automatique des Points F1

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: 

jobs:
  calculer:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Installer les dépendances (Firebase & Axios)
        run: npm install firebase-admin axios

      - name: Créer le fichier de clé Firebase Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-secret.json

      - name: Lancer le script de calcul des scores
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-secret.json
        run: node cron-calcul.js
