<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ F1 2026 PRO - EXPERT PRONOS 🏎️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🏎️ F1 2026 PRO - EXPERT PRONOS 🏎️</h1>

        <div class="main-layout">
            <div class="colonne-gauche">
                
                <div class="section-course">
                    <label for="select-course">SÉLECTIONNER LE WEEK-END :</label>
                    <select id="select-course">
                        <option value="2026/1">01. GP d'Australie (Terminé)</option>
                        <option value="2026/2">02. GP de Chine (Terminé)</option>
                        <option value="2026/3">03. GP de Suzuka (Terminé)</option>
                        <option value="2026/4">04. GP de Bahreïn (Terminé)</option>
                        <option value="2026/5">05. GP de Miami (Terminé)</option>
                        <option value="2026/6">06. GP de Monaco (Terminé)</option>
                        <option value="2026/7">07. GP de Barcelone (Terminé)</option>
                        <option value="2026/8">08. GP de Spielberg (Terminé)</option>
                        <option value="2026/9" selected>09. GP de Grande-Bretagne (Silverstone) - EN COURS</option>
                        <option value="2026/10">10. GP de Hongrie</option>
                        <option value="2026/11">11. GP de Belgique</option>
                        <option value="2026/12">12. GP des Pays-Bas</option>
                        <option value="2026/13">13. GP d'Italie</option>
                    </select>
                </div>

                <div class="section-pole" style="margin-top: 20px; background: #222c43; padding: 15px; border-radius: 8px; border-left: 4px solid #00d2d3;">
                    <label for="select-pole" style="color: #00d2d3; display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem;">⚡ PRONO FLASH : QUI FERA LA POLE POSITION LE SAMEDI ?</label>
                    <select id="select-pole" style="width: 100%; padding: 8px; border-radius: 4px; background: #111622; color: white; border: 1px solid #3b4b6b;"></select>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px;">
                    <h2 style="margin: 0;" id="titre-grille">🏆 TON TOP 10 PILOTES :</h2>
                    <button id="btn-aleatoire" style="background: #3b4b6b; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: background 0.2s;">🎲 PRONO ALÉATOIRE</button>
                </div>

                <div id="grille-pronos" style="margin-top: 15px;"></div>

                <div class="section-top-flop" style="margin-top: 25px; background: #222c43; padding: 15px; border-radius: 8px; border-left: 4px solid #E10600;">
                    <h3 style="margin-top: 0; color: #fff; font-size: 1.1rem; letter-spacing: 0.5px;">🏎️ PRONOSTIC ÉCURIES (TOP / FLOP)</h3>
                    
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div>
                            <label style="color: #4cd137; display: block; margin-bottom: 5px; font-size: 0.85rem;">🔥 LES 2 TOPS :</label>
                            <div style="display: flex; gap: 10px;">
                                <select id="ecurie-top-1" class="select-ecurie"></select>
                                <select id="ecurie-top-2" class="select-ecurie"></select>
                            </div>
                        </div>

                        <div>
                            <label style="color: #ff3f3f; display: block; margin-bottom: 5px; font-size: 0.85rem;">⚠️ LES 2 FLOPS :</label>
                            <div style="display: flex; gap: 10px;">
                                <select id="ecurie-flop-1" class="select-ecurie"></select>
                                <select id="ecurie-flop-2" class="select-ecurie"></select>
                            </div>
                        </div>
                    </div>
                </div>

                <button id="btn-valider">🏁 VALIDER MES PRONOSTICS</button>

            </div>

            <div class="colonne-droite">
                <h2>📊 CLASSEMENT GÉNÉRAL DES AMIS :</h2>
                <div class="tableau-scores">
                    <div class="entete-scores">
                        <div>Pos</div>
                        <div>Joueur</div>
                        <div style="text-align: right;">Points</div>
                    </div>
                    <div class="ligne-joueur">
                        <div class="pos-podium">🥇 1</div>
                        <div>PiloteMystere 👑</div>
                        <div class="score-points">145 pts</div>
                    </div>
                    <div class="ligne-joueur">
                        <div class="pos-podium">🥈 2</div>
                        <div>LandoFan 🧠</div>
                        <div class="score-points">132 pts</div>
                    </div>
                </div>
            </div>

        </div>
    </div>
     <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script> <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <script src="script.js"></script>

</body>

</html>
