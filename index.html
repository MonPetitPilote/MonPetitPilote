<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonPetitPilote — Pronos F1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏎️ MonPetitPilote — Pronos F1</h1>
        <p>Le jeu de pronostics F1 entre potes</p>
    </header>

    <main class="container">
        <div class="section-course">
            <label for="select-course">SÉLECTIONNER LE WEEK-END :</label>
            <select id="select-course" onchange="verifierStatutDuGrandPrix()">
                </select>
        </div>

        <section class="grille-pronos">
            <h2 id="titre-grille">🏆 TON TOP 10 PILOTES :</h2>
            <div class="actions-grille">
                <button id="btn-aleatoire" onclick="genererGrilleAleatoire()">🎲 Grille Aléatoire</button>
            </div>

            <form id="form-pronos" onsubmit="sauvegarderPronostics(event)">
                <div id="conteneur-positions">
                    </div>

                <div class="bonus-box">
                    <label for="select-pole">⏱️ BONUS POLE POSITION (Samedi) :</label>
                    <select id="select-pole">
                        </select>
                </div>

                <div class="ecuries-box">
                    <h3>🏎️ PRONOS ÉCURIES (Bonus)</h3>
                    <div class="ecurie-ligne">
                        <label>🔥 Écurie TOP (Les 2 dans le Top 10) :</label>
                        <div id="ecuries-top-container"></div>
                    </div>
                    <div class="ecurie-ligne">
                        <label>⚠️ Écurie FLOP (0 dans le Top 10) :</label>
                        <div id="ecuries-flop-container"></div>
                    </div>
                </div>

                <button type="submit" id="btn-valider">🏁 VALIDER MES PRONOSTICS</button>
            </form>
        </section>

        <section class="classement-general">
            <h2>📊 CLASSEMENT GÉNÉRAL DU CHAMPIONNAT</h2>
            <table id="table-classement">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Joueur</th>
                        <th>Points</th>
                    </tr>
                </thead>
                <tbody id="corps-classement">
                    </tbody>
            </table>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
