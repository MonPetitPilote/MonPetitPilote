<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ F1 2026 PRO - EXPERT PRONOS 🏎️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🏎️ F1 2026 PRO - EXPERT PRONOS 🏎️</h1>

        <div class="main-layout">
            <div class="colonne-gauche">
                
                <div class="section-course">
                    <label for="select-course">SÉLECTIONNER LE WEEK-END :</label>
                    <select id="select-course">
                        <option value="past">01. GP d'Australie (Vainqueur: G. Russell)</option>
                        <option value="past">02. GP de Chine (Vainqueur: K. Antonelli)</option>
                        <option value="past">03. GP de Suzuka (Vainqueur: K. Antonelli)</option>
                        <option value="past">04. GP de Bahreïn (Vainqueur: K. Antonelli)</option>
                        <option value="past">05. GP de Miami (Vainqueur: K. Antonelli)</option>
                        <option value="past">06. GP de Monaco (Vainqueur: K. Antonelli)</option>
                        <option value="past">07. GP de Barcelone (Vainqueur: L. Hamilton)</option>
                        <option value="past">08. GP de Spielberg (Vainqueur: G. Russell)</option>
                        <option value="09. GP de Grande-Bretagne (Silverstone)" selected>09. GP de Grande-Bretagne (Silverstone) - EN COURS</option>
                        <option value="10. GP de Hongrie">10. GP de Hongrie (Budapest)</option>
                        <option value="11. GP de Belgique">11. GP de Belgique (Spa-Francorchamps)</option>
                        <option value="12. GP des Pays-Bas">12. GP des Pays-Bas (Zandvoort)</option>
                        <option value="13. GP d'Italie">13. GP d'Italie (Monza)</option>
                    </select>
                </div>

                <h2>🏆 TON TOP 10 PILOTES :</h2>
                <div id="grille-pronos"></div>

                <div class="section-top-flop" style="margin-top: 25px; background: #222c43; padding: 15px; border-radius: 8px; border-left: 4px solid #E10600;">
                    <h3 style="margin-top: 0; color: #fff; font-size: 1.1rem; letter-spacing: 0.5px;">🏎️ PRONOSTIC ÉCURIES (TOP / FLOP)</h3>
                    
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div>
                            <label style="color: #4cd137; display: block; margin-bottom: 5px; font-size: 0.85rem;">🔥 LES 2 TOPS (Stratégie, Rythme, Dépassements) :</label>
                            <div style="display: flex; gap: 10px;">
                                <select id="ecurie-top-1" class="select-ecurie"></select>
                                <select id="ecurie-top-2" class="select-ecurie"></select>
                            </div>
                        </div>

                        <div>
                            <label style="color: #ff3f3f; display: block; margin-bottom: 5px; font-size: 0.85rem;">⚠️ LES 2 FLOPS (Crash, Stratégie ratée, Manque de rythme) :</label>
                            <div style="display: flex; gap: 10px;">
                                <select id="ecurie-flop-1" class="select-ecurie"></select>
                                <select id="ecurie-flop-2" class="select-ecurie"></select>
                            </div>
                        </div>
                    </div>
                </div>

                <button id="btn-valider">🏁 VALIDER MES PRONOSTICS</button>

            </div>

            <div class="colonne-droite">
                <h2>📊 CLASSEMENT GÉNÉRAL DES AMIS :</h2>
                <div class="tableau-scores">
                    <div class="entete-scores">
                        <div>Pos</div>
                        <div>Joueur</div>
                        <div style="text-align: right;">Points</div>
                    </div>
                    <div class="ligne-joueur">
                        <div class="pos-podium">🥇 1</div>
                        <div>PiloteMystere</div>
                        <div class="score-points">145 pts</div>
                    </div>
                    <div class="ligne-joueur">
                        <div class="pos-podium">🥈 2</div>
                        <div>LandoFan</div>
                        <div class="score-points">132 pts</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
